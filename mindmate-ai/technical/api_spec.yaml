        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [info, warning, feature, maintenance]
        target_audience:
          type: string
          enum: [all, free, premium, admin]
        active:
          type: boolean
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CreateAnnouncementRequest:
