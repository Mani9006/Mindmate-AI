# ==================== WEBHOOKS (Future) ====================
webhooks:
  moodLogged:
    post:
      summary: Mood logged webhook
      description: Triggered when a user logs their mood
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                mood_entry:
                  $ref: '#/components/schemas/MoodEntry'
                timestamp:
                  type: string
                  format: date-time

  sessionCompleted:
    post:
      summary: Session completed webhook
      description: Triggered when a therapy session is completed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                session:
                  $ref: '#/components/schemas/Session'
                summary:
                  $ref: '#/components/schemas/SessionSummary'
                timestamp:
                  type: string
                  format: date-time

  achievementEarned:
    post:
      summary: Achievement earned webhook
      description: Triggered when a user earns an achievement
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                achievement:
                  $ref: '#/components/schemas/Achievement'
                timestamp:
                  type: string
                  format: date-time

  crisisAlert:
    post:
      summary: Crisis alert webhook
      description: Triggered when a potential crisis is detected
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                alert_type:
                  type: string
                  enum: [high_risk_detected, self_harm_keywords, crisis_check_in]
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                context:
                  type: string
                timestamp:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Webhook processed successfully
