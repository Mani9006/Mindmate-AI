components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login/refresh endpoints

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: bad_request
            message: Invalid request parameters
            code: 400

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized
            message: Invalid or missing authentication token
            code: 401

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: forbidden
            message: Insufficient permissions to access this resource
            code: 403

    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not_found
            message: Requested resource not found
            code: 404

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: conflict
            message: Resource already exists
            code: 409

    ValidationError:
      description: Validation Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    RateLimitExceeded:
      description: Rate Limit Exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Request limit per window
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests in current window
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp when the rate limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: rate_limit_exceeded
            message: Too many requests, please try again later
            code: 429
            retry_after: 60

  schemas:
    # ==================== ERROR SCHEMAS ====================
    Error:
      type: object
      required:
        - error
        - message
        - code
      properties:
        error:
          type: string
          description: Error type identifier
        message:
          type: string
          description: Human-readable error message
        code:
          type: integer
          description: HTTP status code
        details:
          type: object
          description: Additional error details
        request_id:
          type: string
          description: Unique request ID for debugging

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            field_errors:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                  code:
                    type: string

    # ==================== AUTH SCHEMAS ====================
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: Must contain at least one uppercase, one lowercase, one number
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        date_of_birth:
          type: string
          format: date
        timezone:
          type: string
          default: UTC
        referral_code:
          type: string
          description: Optional referral code
        marketing_consent:
          type: boolean
          default: false

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        device_info:
          type: object
          properties:
            device_id:
              type: string
            platform:
              type: string
              enum: [ios, android, web]
            app_version:
              type: string

    AuthResponse:
      type: object
      required:
        - access_token
        - refresh_token
        - user
      properties:
        access_token:
          type: string
          description: JWT access token (expires in 15 minutes)
        refresh_token:
          type: string
          description: Refresh token (expires in 30 days)
        expires_in:
          type: integer
          description: Access token expiration time in seconds
          default: 900
        token_type:
          type: string
          default: Bearer
        user:
          $ref: '#/components/schemas/UserProfile'
        mfa_required:
          type: boolean
          default: false
        temp_token:
          type: string
          description: Temporary token when MFA is required

    TokenRefreshResponse:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
          description: New refresh token (rotated)
        expires_in:
          type: integer
          default: 900

    # ==================== USER SCHEMAS ====================
    UserProfile:
      type: object
      required:
        - id
        - email
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        avatar_url:
          type: string
          format: uri
        date_of_birth:
          type: string
          format: date
        timezone:
          type: string
        email_verified:
          type: boolean
        mfa_enabled:
          type: boolean
        subscription_tier:
          type: string
          enum: [free, premium, enterprise]
        subscription_status:
          type: string
          enum: [active, cancelled, expired, pending]
        onboarding_completed:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
        account_status:
          type: string
          enum: [active, suspended, pending_deletion]

    UpdateUserRequest:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        date_of_birth:
          type: string
          format: date
        timezone:
          type: string

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, auto]
          default: auto
        language:
          type: string
          default: en
        ai_personality:
          type: string
          enum: [empathetic, professional, friendly, motivational]
          default: empathetic
        session_reminders:
          type: boolean
          default: true
        mood_reminders:
          type: boolean
          default: true
        task_reminders:
          type: boolean
          default: true
        reminder_time:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
          default: '09:00'
        privacy_settings:
          type: object
          properties:
            share_analytics:
              type: boolean
              default: true
            allow_ai_training:
              type: boolean
              default: false
        notification_settings:
          type: object
          properties:
            push_enabled:
              type: boolean
              default: true
            email_enabled:
              type: boolean
              default: true
            sms_enabled:
              type: boolean
              default: false

    Subscription:
      type: object
      properties:
        tier:
          type: string
          enum: [free, premium, enterprise]
        status:
          type: string
          enum: [active, cancelled, expired, pending]
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        payment_method:
          type: object
          properties:
            type:
              type: string
            last_four:
              type: string
            expiry_month:
              type: integer
            expiry_year:
              type: integer
        features:
          type: array
          items:
            type: string

    # ==================== SESSION SCHEMAS ====================
    Session:
      type: object
      required:
        - id
        - user_id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        status:
          type: string
          enum: [active, completed, archived]
        session_type:
          type: string
          enum: [general, guided, crisis, check_in]
          default: general
        message_count:
          type: integer
        duration_seconds:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        ai_model:
          type: string

    SessionDetail:
      allOf:
        - $ref: '#/components/schemas/Session'
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'
            summary:
              type: string
            key_topics:
              type: array
